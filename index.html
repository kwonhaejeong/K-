<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K 골프 가이드 프리미엄 코스 가이드</title>
    <link rel="stylesheet" as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            --primary: #8cb33e;
            --primary-dark: #6a8a2e;
            --bg-dark: #0d0d0d;
            --bg-card: #1a1a1a;
            --bg-surface: #222222;
            --text-primary: #f5f0e8;
            --text-secondary: #a09888;
            --text-muted: #666;
            --border: #2a2a2a;
            --border-light: #333;
            --golf-green: #1a4d2e;
            --golf-light: #e8f0e0;
            --highlight-color: #8cb33e;
        }

        body.light-mode {
            --primary: #6a8a2e;
            --primary-dark: #8cb33e;
            --bg-dark: #f5f5f5;
            --bg-card: #ffffff;
            --bg-surface: #eeeeee;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border: #dddddd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-primary); transition: 0.3s; padding-bottom: 80px; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; padding: 10px 20px; gap: 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-dark); z-index: 100; }
        .tab { color: var(--text-secondary); cursor: pointer; padding-bottom: 5px; font-weight: 500; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .section { display: none; padding: 20px; }
        .section.active { display: block; }

        /* 사진 카드 스타일 */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .photo-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .photo-img-wrapper { width: 100%; aspect-ratio: 1; overflow: hidden; background: #000; }
        .photo-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .photo-info { padding: 10px; border-top: 1px solid var(--border); cursor: pointer; }

        /* 버튼 스타일 */
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
        
        /* 라이트박스 */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-size: 1.1em; color: var(--primary);">K GOLF GUIDE</h2>
        <div onclick="document.body.classList.toggle('light-mode')" style="cursor:pointer; font-size: 1.2em;">🌓</div>
    </div>

    <div class="nav-tabs">
        <div class="tab active" onclick="showSection('album')">나의 앨범</div>
        <div class="tab" onclick="showSection('score')">스코어 기록</div>
    </div>

    <div id="album" class="section active">
        <button class="btn-add" onclick="document.getElementById('file-input').click()">+ 새로운 사진 추가</button>
        <input type="file" id="file-input" hidden multiple accept="image/*" onchange="uploadPhotos(this)">
        <div class="photo-grid" id="photo-grid"></div>
    </div>

    <div id="score" class="section">
        <button class="btn-add" onclick="addScore()">+ 스코어 등록</button>
        <div id="score-list"></div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img"></div>

    <script>
        // [수정됨] 로컬 스토리지에서 사진과 스코어 데이터를 불러옵니다.
        let savedPhotos = JSON.parse(localStorage.getItem('golf_photos')) || [];
        let scoreHistory = JSON.parse(localStorage.getItem('golf_scores')) || [];

        window.onload = function() {
            renderPhotoGrid();
            renderScoreList();
        };

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 사진 업로드 및 저장
        function uploadPhotos(input) {
            if (input.files) {
                const place = prompt("장소를 입력해주세요", "동촌GC");
                if (!place) return;

                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = e => {
                        savedPhotos.unshift({ 
                            id: Date.now() + Math.random(), 
                            url: e.target.result, 
                            place, 
                            date: new Date().toLocaleDateString() 
                        });
                        savePhotos();
                        renderPhotoGrid();
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        // 스코어 등록 및 저장
        function addScore() {
            const club = prompt("골프장 이름을 입력하세요");
            const score = prompt("타수를 입력하세요");
            if (club && score) {
                scoreHistory.unshift({ id: Date.now(), club, score, date: new Date().toLocaleDateString() });
                saveScores();
                renderScoreList();
            }
        }

        // 데이터 저장 함수들
        function savePhotos() {
            try {
                localStorage.setItem('golf_photos', JSON.stringify(savedPhotos));
            } catch(e) { alert("저장 공간이 부족합니다. 사진 최적화가 필요합니다."); }
        }

        function saveScores() {
            localStorage.setItem('golf_scores', JSON.stringify(scoreHistory));
        }

        // 사진 화면 출력
        function renderPhotoGrid() {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = savedPhotos.length ? '' : '<div style="grid-column:1/3; text-align:center; color:#666; padding:40px 0;">사진이 없습니다.</div>';
            savedPhotos.forEach(p => {
                grid.innerHTML += `
                    <div class="photo-card">
                        <div class="photo-img-wrapper"><img src="${p.url}" class="photo-img" onclick="openLightbox(this.src)"></div>
                        <div class="photo-info" onclick="deletePhoto(${p.id})">
                            <div style="font-size:0.85em; font-weight:700;">${p.place}</div>
                            <div style="font-size:0.7em; color:#666;">${p.date} (삭제클릭)</div>
                        </div>
                    </div>`;
            });
        }

        // 스코어 화면 출력
        function renderScoreList() {
            const list = document.getElementById('score-list');
            list.innerHTML = scoreHistory.length ? '' : '<div style="text-align:center; color:#666; padding:40px 0;">기록이 없습니다.</div>';
            scoreHistory.forEach(s => {
                list.innerHTML += `
                    <div style="background:var(--bg-card); padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-size:0.9em; font-weight:bold;">${s.club}</div>
                            <div style="font-size:0.75em; color:var(--text-secondary);">${s.date}</div>
                        </div>
                        <div style="color:var(--primary); font-weight:800; font-size:1.2em;">${s.score}타</div>
                    </div>`;
            });
        }

        function deletePhoto(id) {
            if(confirm('이 사진을 삭제하시겠습니까?')) {
                savedPhotos = savedPhotos.filter(p => p.id !== id);
                savePhotos();
                renderPhotoGrid();
            }
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
